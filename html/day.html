<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#6c63ff">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="PraktiskDag">
    <title>Praktisk dag</title>
    <link rel="manifest" href="../manifest.webmanifest">
    <link rel="icon" href="../icons/app-icon.svg" type="image/svg+xml">
    <link rel="apple-touch-icon" href="../icons/app-icon.svg">
    <link rel="stylesheet" href="../css/styles.css">
</head>
<body>
    <main class="app-shell day-shell">
        <div class="top-nav">
            <a id="back-to-calendar" class="back-link" href="./index.html">← Tilbage til kalender</a>
            <a href="./entries.html" class="book-btn" aria-label="Se mine tidligere indberettelser" title="Mine indberettelser">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="20" height="20" aria-hidden="true">
                    <path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/>
                    <path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/>
                </svg>
                <span class="book-btn-label">Min dagbog</span>
            </a>
        </div>

        <section class="hero-card day-hero">
            <p class="eyebrow">Dagens side</p>
            <h1 id="selected-date-heading">Praktisk dag</h1>
            <p id="selected-date-subtitle" class="hero-text">Her kan du gemme det, du har lavet i dag.</p>
        </section>

        <section class="panel day-panel">
            <form id="journal-form" novalidate>
                <div class="image-picker-row">
                    <button type="button" class="image-picker-btn" id="choose-image-button">Vælg et billede</button>
                    <input type="file" id="journal-images" name="images" accept="image/*" multiple class="image-input-hidden">
                </div>
                <p class="help-text">Du må gerne vælge flere billeder.</p>

                <div id="image-preview" class="image-preview" hidden></div>

                <label for="journal-text">Skriv om din dag</label>
                <textarea id="journal-text" name="text" rows="6" placeholder="Eksempel: I dag lavede jeg mad, ryddede op og var i praktik." required></textarea>
                <p class="input-hint">Du kan skrive få eller mange linjer.</p>

                <div class="form-actions">
                    <button type="submit" class="primary-btn" id="submit-button">Gem nu</button>
                </div>
            </form>

        </section>
    </main>
    <script src="../js/pwa.js"></script>
    <script src="../js/app.js"></script>
</body>
</html>
